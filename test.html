<!DOCTYPE html>
<html lang="en">
<head>
    <title>OpenBehavior-Auth Tester</title>
    <style>
        body { font-family: sans-serif; padding: 50px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; background: #f4f4f4; padding: 20px; border-radius: 8px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; }
        #result { padding: 15px; margin-top: 20px; border-radius: 4px; font-weight: bold; background: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Behavioral Auth Tester</h2>
        <p>Type at least 10 characters to trigger a check.</p>
        <input type="text" id="typeBox" placeholder="Start typing here...">
        <div id="result">Waiting for input...</div>
    </div>

    <script>
    let metrics = { dwells: [], flights: [], lastUp: null, lastDown: null };

    // Capture the typing rhythm
    document.getElementById('inputBox').addEventListener('keydown', (e) => {
        metrics.lastDown = performance.now();
    });

    document.getElementById('inputBox').addEventListener('keyup', (e) => {
        const now = performance.now();
        if (metrics.lastDown) metrics.dwells.push(now - metrics.lastDown);
        if (metrics.lastUp) metrics.flights.push(metrics.lastDown - metrics.lastUp);
        metrics.lastUp = now;

        // Every 10 characters, send the data to your Python API
        if (metrics.dwells.length % 10 === 0) {
            const avg = arr => arr.length ? arr.reduce((a, b) => a + b) / arr.length : 0;


            const payload = {
    user_id: "user_101",
    dwellTime: avg(metrics.dwells) || 0,
    flightTime: avg(metrics.flights) || 0,
    rhythmVariance: 15.0, // Placeholder for now
    deleteRatio: 0, 
    mouseJitter: 0,
    mouseVelocity: 0,
    clickDuration: 0,
    raw_timings: metrics.dwells || []
};
            

            fetch('http://127.0.0.1:8000/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                // This updates the labels on your screen
                document.getElementById('status').innerText = data.status;
                document.getElementById('progress').innerText = data.progress || "Verified";
                console.log("Response from API:", data);
            })
            .catch(err => console.error("API Error:", err));
        }
    });
</script>
</body>
</html>
